name: Compile Binaries
on:
  push:
    branches:
      - master
      - "release/**"
    tags-ignore:
      - '*'
  pull_request:
    types: ['opened', 'synchronize']
    paths:
      - '**.go'
      - go.mod
      - '.github/workflows/**'
      - '!**_test.go'

env:
  GOPROXY: https://proxy.golang.org,direct
  GO_VERSION: "1.25.8"

jobs:
  compile-fast:
    runs-on: macos-14
    if: github.event.pull_request.draft == true
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run GoReleaser (Fast)
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          version: 2.15.4
          args: release --config .goreleaser-fast.yml --clean --skip=publish,sign --snapshot

  compile:
    runs-on: macos-14
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          version: 2.15.4
          args: release --clean --skip=publish,sign --snapshot
