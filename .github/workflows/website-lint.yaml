name: Docs and Website Lint
on:
  push:
    branches:
      - master
      - "release/**"
  pull_request:
    types: ['opened', 'synchronize']
    paths:
      - .github/workflows/website-lint.yaml
      - docs/**

env:
  GOPROXY: https://proxy.golang.org,direct
  GO_VERSION: "1.25.8"

jobs:
  website-generation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Get dependencies
        run: go mod download
      - name: Generate the website
        run: make website-generation
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make website-generation' command and commit."; exit 1)
  website-lint-spellcheck-tffmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: docker version
      - name: Setup tools
        run: make setup
      - name: Lint website
        run: make website-lint
  markdown-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: avto-dev/markdown-lint@04d43ee9191307b50935a753da3b775ab695eceb # v1
        with:
          args: 'docs'
          config: '.markdownlint.yml'

